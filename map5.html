    surveyMarkers = {};\n  }\n\n  function updateProgress(){\n    var doneCount = 0;\n    var closedCount = 0;\n    var rejectCount = 0;\n\n    surveyData.forEach(function(p){\n      var s = String(p.status || '').trim();\n\n      if(s === '완료' || s === '조사완료') doneCount++;\n      if(s === '폐업') closedCount++;\n      if(s === '거절') rejectCount++;\n    });\n\n    var percent = totalCount > 0 ? Math.round((doneCount / totalCount) * 100) : 0;\n\n    var box = document.getElementById('surveyProgressBox');\n    if(box){\n      box.innerHTML =\n        '<b>조사진행률<\/b><br>' +\n        '조사완료: ' + doneCount + ' / ' + totalCount + ' (' + percent + '%)<br>' +\n        '폐업: ' + closedCount + '<br>' +\n        '거절: ' + rejectCount;\n    }\n  }\n\n  function renderSurveyData(){\n    clearSurveyMarkers();\n\n    surveyData.forEach(function(p){\n      if(p.lat === undefined || p.lng === undefined || isNaN(p.lat) || isNaN(p.lng)) return;\n\n      var color = 'green';\n      if(p.status === '폐업') color = 'red';\n      if(p.status === '거절') color = 'orange';\n\n      var marker = L.circleMarker([p.lat, p.lng], {\n        radius: 8,\n        color: color,\n        fillColor: color,\n        fillOpacity: 0.9,\n        interactive: false\n      }).addTo(surveyLayer);\n\n      surveyMarkers[p.code] = marker;\n    });\n\n    updateProgress();\n  }\n\n  function fetchSurveyData(){\n    fetch(GAS_URL + '?action=list&ts=' + Date.now())\n      .then(function(res){ return res.json(); })\n      .then(function(data){\n        if(!Array.isArray(data)){\n          console.log('데이터 형식 오류', data);\n          return;\n        }\n        surveyData = data;\n        renderSurveyData();\n      })\n      .catch(function(err){\n        console.log('공유 데이터 불러오기 실패:', err);\n      });\n  }\n\n  function saveSurveyPoint(code, lat, lng, status){\n    var url =\n      GAS_URL +\n      '?action=save' +\n      '&code=' + encodeURIComponent(code) +\n      '&status=' + encodeURIComponent(status) +\n      '&user=' + encodeURIComponent(surveyUser) +\n      '&lat=' + encodeURIComponent(lat) +\n      '&lng=' + encodeURIComponent(lng) +\n      '&ts=' + Date.now();\n\n    fetch(url)\n      .then(function(res){ return res.json(); })\n      .then(function(data){\n        if(!data.ok){\n          console.log('저장 실패 응답', data);\n          alert('저장에 실패했습니다.');\n          return;\n        }\n        fetchSurveyData();\n      })\n      .catch(function(err){\n        console.log('공유 데이터 저장 실패:', err);\n        alert('저장에 실패했습니다.');\n      });\n  }\n\n  function resetSurveyData(){\n    var password = prompt('관리자 비밀번호를 입력하세요', '');\n\n    if(password === null) return;\n\n    password = String(password).trim();\n\n    if(password === ''){\n      alert('비밀번호를 입력하세요.');\n      return;\n    }\n\n    if(password !== adminPassword){\n      alert('비밀번호가 올바르지 않습니다.');\n      return;\n    }\n\n    if(!confirm('공유 조사 기록을 모두 삭제하고 초기 상태로 되돌리시겠습니까?')) return;\n\n    fetch(GAS_URL + '?action=reset&password=' + encodeURIComponent(password) + '&ts=' + Date.now())\n      .then(function(res){ return res.json(); })\n      .then(function(data){\n        if(data.ok){\n          surveyData = [];\n          clearSurveyMarkers();\n          updateProgress();\n          map.closePopup();\n\n          setTimeout(function(){\n            fetchSurveyData();\n          }, 500);\n\n          alert('초기화되었습니다.');\n        } else {\n          console.log('초기화 실패 응답:', data);\n          alert('초기화 실패');\n        }\n      })\n      .catch(function(err){\n        console.log('초기화 실패:', err);\n        alert('초기화 실패');\n      });\n  }\n\n  function onLocationFound(e){\n    var latlng = e.latlng;\n    var radius = e.accuracy || 0;\n\n    if(!currentMarker){\n      currentMarker = L.circleMarker(latlng, {\n        radius: 8,\n        color: 'blue',\n        fillColor: 'blue',\n        fillOpacity: 0.8\n      }).addTo(map);\n\n      currentMarker.bindPopup('현재 위치');\n    } else {\n      currentMarker.setLatLng(latlng);\n    }\n\n    if(radius > 0){\n      if(!accuracyCircle){\n        accuracyCircle = L.circle(latlng, {\n          radius: radius,\n          color: 'blue',\n          fillColor: 'blue',\n          fillOpacity: 0.1,\n          weight: 1\n        }).addTo(map);\n      } else {\n        accuracyCircle.setLatLng(latlng);\n        accuracyCircle.setRadius(radius);\n      }\n    }\n\n    if(moveToCurrentLocation){\n      map.flyTo(latlng, 18);\n      currentMarker.openPopup();\n      moveToCurrentLocation = false;\n    }\n  }\n\n  function onLocationError(e){\n    console.log('위치 찾기 실패:', e.message);\n  }\n\n  var customControl = L.control({position:'topright'});\n\n  customControl.onAdd = function(map){\n    var div = L.DomUtil.create('div', 'leaflet-bar');\n\n    div.style.background = 'white';\n    div.style.padding = '6px';\n    div.style.border = '1px solid #999';\n\n    var progressBox = document.createElement('div');\n    progressBox.id = 'surveyProgressBox';\n    progressBox.style.width = '160px';\n    progressBox.style.marginBottom = '6px';\n    progressBox.style.padding = '5px 8px';\n    progressBox.style.fontSize = '12px';\n    progressBox.style.border = '1px solid #ccc';\n    progressBox.style.background = '#f8f8f8';\n\n    var locateBtn = document.createElement('button');\n    locateBtn.innerHTML = '내 위치';\n    locateBtn.style.display = 'block';\n    locateBtn.style.width = '160px';\n    locateBtn.style.padding = '5px 8px';\n    locateBtn.style.fontSize = '12px';\n    locateBtn.style.cursor = 'pointer';\n    locateBtn.style.marginBottom = '6px';\n\n    var resetBtn = document.createElement('button');\n    resetBtn.innerHTML = '조사기록 초기화';\n    resetBtn.style.display = 'block';\n    resetBtn.style.width = '160px';\n    resetBtn.style.padding = '5px 8px';\n    resetBtn.style.fontSize = '12px';\n    resetBtn.style.cursor = 'pointer';\n\n    div.appendChild(progressBox);\n    div.appendChild(locateBtn);\n    div.appendChild(resetBtn);\n\n    L.DomEvent.disableClickPropagation(div);\n    L.DomEvent.disableScrollPropagation(div);\n\n    locateBtn.onclick = function(e){\n      if(e){\n        e.preventDefault();\n        e.stopPropagation();\n      }\n\n      moveToCurrentLocation = true;\n\n      map.locate({\n        setView: false,\n        maxZoom: 18,\n        enableHighAccuracy: true\n      });\n    };\n\n    resetBtn.onclick = function(e){\n      if(e){\n        e.preventDefault();\n        e.stopPropagation();\n      }\n      resetSurveyData();\n    };\n\n    return div;\n  };\n\n  customControl.addTo(map);\n\n  map.on('popupopen', function(e){\n    var popup = e.popup;\n    var layer = popup._source;\n\n    if(!layer || !layer.getLatLng) return;\n\n    var latlng = layer.getLatLng();\n    var lat = latlng.lat;\n    var lng = latlng.lng;\n\n    var contentNode = popup.getElement().querySelector('.leaflet-popup-content');\n    if(!contentNode) return;\n\n    var codeNode = contentNode.querySelector('.survey-code');\n    var code = codeNode ? codeNode.textContent.trim() : null;\n\n    function makeBtn(text, status){\n      var btn = document.createElement('button');\n      btn.innerHTML = text;\n      btn.style.marginTop = '5px';\n      btn.style.fontSize = '40px';\n      btn.style.padding = '25px';\n      btn.style.display = 'block';\n\n      btn.onclick = function(){\n        if(!code){\n          alert('CODE 값을 찾을 수 없습니다.');\n          return;\n        }\n        saveSurveyPoint(code, lat, lng, status);\n        map.closePopup();\n      };\n\n      return btn;\n    }\n\n    contentNode.appendChild(makeBtn('조사완료', '완료'));\n    contentNode.appendChild(makeBtn('폐업', '폐업'));\n    contentNode.appendChild(makeBtn('거절', '거절'));\n  });\n\n  map.on('locationfound', onLocationFound);\n  map.on('locationerror', onLocationError);\n\n  fetchSurveyData();\n\n  map.locate({\n    setView: false,\n    maxZoom: 18,\n    enableHighAccuracy: true,\n    watch: true\n  });\n\n  setInterval(fetchSurveyData, 10000);\n}).call(this.getMap(), el, x, data);\n}","data":null}]}}</script>
